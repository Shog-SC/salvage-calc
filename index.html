<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <title>Salvage → Construction Materials</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background-color: #0b0e12;
      color: #f5f5f5;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      margin: 0;
    }
    .card {
      background: #151922;
      padding: 20px 24px;
      border-radius: 10px;
      box-shadow: 0 0 10px rgba(0,0,0,0.5);
      max-width: 420px;
      width: 100%;
    }
    h1 {
      font-size: 20px;
      margin-top: 0;
      margin-bottom: 10px;
      color: #ffd166;
    }
    label {
      display: block;
      margin-top: 10px;
      font-weight: 600;
    }
    input {
      width: 100%;
      padding: 6px 8px;
      margin-top: 4px;
      border-radius: 4px;
      border: 1px solid #333;
      background: #0f131a;
      color: #f5f5f5;
    }
    button {
      margin-top: 14px;
      width: 100%;
      padding: 8px;
      border: none;
      border-radius: 4px;
      background: #06d6a0;
      color: #111;
      font-weight: 700;
      cursor: pointer;
    }
    button:hover {
      background: #04b783;
    }
    .result {
      margin-top: 14px;
      padding-top: 8px;
      border-top: 1px solid #333;
      font-size: 14px;
      line-height: 1.4;
    }
    .note {
      margin-top: 10px;
      font-size: 11px;
      color: #bbb;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>Salvage → CMAT & Valeur</h1>

    <label for="salvageScu">
      SCU de <strong>Construction Salvage</strong> (sortie Reclaimer)
    </label>
    <input id="salvageScu" type="number" step="0.01" value="240" />

    <label for="ratio">
      Ratio Salvage → CMAT (SCU CMAT par 1 SCU Salvage)
    </label>
    <!-- ≈ 199 / 1200 = 0.1658 d'après ton exemple -->
    <input id="ratio" type="number" step="0.001" value="0.166" />

    <label for="price">
      Prix CMAT / SCU (aUEC) – UEX (~7 1xx–7 6xx)
    </label>
    <!-- Valeur moyenne UEX actuelle ~7 300 aUEC / SCU -->
    <input id="price" type="number" step="1" value="7300" />

    <button onclick="calculate()">Calculer</button>

    <div class="result" id="result"></div>

    <div class="note">
      ⚠ Ratios & prix basés sur observations joueurs + UEX,
      pas officiels CIG. Mets à jour le prix quand le marché change.
    </div>
  </div>

  <script>
    function formatNumber(n) {
      return n.toLocaleString("fr-FR", {
        minimumFractionDigits: 2,
        maximumFractionDigits: 2
      });
    }

    function calculate() {
      const salvageScu = parseFloat(document.getElementById("salvageScu").value) || 0;
      const ratio = parseFloat(document.getElementById("ratio").value) || 0;
      const price = parseFloat(document.getElementById("price").value) || 0;

      const cmatScu = salvageScu * ratio;
      const totalValue = cmatScu * price;

      const res = `
        SCU Salvage : <strong>${formatNumber(salvageScu)}</strong> SCU<br>
        ➜ Estimation CMAT : <strong>${formatNumber(cmatScu)}</strong> SCU<br>
        ➜ Valeur totale (à ${formatNumber(price)} aUEC / SCU) :
        <strong>${formatNumber(totalValue)} aUEC</strong>
      `;

      document.getElementById("result").innerHTML = res;
    }

    // Calcul initial
    calculate();
  </script>
</body>
</html>
