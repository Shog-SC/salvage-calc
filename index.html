<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <title>Salvage 4.4 – Calcul CMAT</title>
  <style>
    /* STYLE GLOBAL IDENTIQUE À TON ANCIEN CODE */
    body {
      margin: 0;
      padding: 0;
      font-family: "Segoe UI", system-ui, sans-serif;
      color: #f5f5f5;
      background: #050505 url("background.jpg") no-repeat center center fixed;
      background-size: cover;
    }

    .overlay {
      background: radial-gradient(circle at top, rgba(0,0,0,0.75), rgba(0,0,0,0.95));
      min-height: 100vh;
      padding: 30px 10px 40px;
    }

    .container {
      max-width: 1150px;
      margin: 0 auto;
      border: 2px solid #ffb000;
      border-radius: 10px;
      padding: 25px 30px 30px;
      background: rgba(5,5,5,0.9);
      box-shadow: 0 0 30px rgba(0,0,0,0.8);
    }

    h1 {
      margin: 0 0 25px;
      text-align: center;
      font-size: 32px;
      text-transform: uppercase;
      letter-spacing: 2px;
      color: #ffb000;
    }

    .sub {
      text-align: center;
      font-size: 13px;
      color: #ffcc66;
      margin-bottom: 15px;
    }

    .grid {
      display: grid;
      grid-template-columns: 1.1fr 1.1fr;
      gap: 26px;
    }

    .panel {
      border-radius: 8px;
      border: 1px solid #ffb000;
      background: linear-gradient(160deg, #151515, #050505);
      padding: 18px 18px 20px;
    }

    .panel-title {
      font-size: 20px;
      color: #ffb000;
      margin-bottom: 12px;
      font-weight: 600;
    }

    label {
      display: block;
      margin-top: 12px;
      font-size: 15px;
      font-weight: 600;
    }

    .hint {
      font-size: 11px;
      color: #ffdd88;
      margin-top: 2px;
    }

    input[type="number"] {
      width: 100%;
      margin-top: 4px;
      padding: 9px 10px;
      border-radius: 6px;
      border: 2px solid #ffb000;
      background: #222;
      color: #fff;
      font-size: 16px;
      outline: none;
      box-sizing: border-box;
    }

    input[readonly] {
      background: #111;
      color: #bbbbbb;
      border-color: #555;
    }

    input[type=number]::-webkit-inner-spin-button,
    input[type=number]::-webkit-outer-spin-button {
      -webkit-appearance: none;
      margin: 0;
    }

    input[type=number] {
      -moz-appearance: textfield;
    }

    .tag-row {
      margin-top: 14px;
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      font-size: 11px;
    }

    .tag {
      padding: 4px 8px;
      border-radius: 999px;
      border: 1px solid #ffb000;
      background: #221600;
      color: #ffd766;
    }

    .tag.red {
      border-color: #ff4444;
      background: #3a0000;
      color: #ffaaaa;
    }

    .small-note {
      margin-top: 8px;
      font-size: 11px;
      color: #bbbbbb;
    }

    .result-block {
      background: #151515;
      border-radius: 8px;
      border: 1px solid #444;
      padding: 14px 14px 10px;
      margin-bottom: 14px;
    }

    .result-head {
      font-size: 14px;
      font-weight: 600;
      margin-bottom: 8px;
      color: #ffe08a;
    }

    .result-values {
      font-size: 14px;
      line-height: 1.5;
      white-space: pre-line;
    }

    .decision {
      margin-top: 8px;
      padding: 8px 10px;
      border-radius: 6px;
      font-size: 14px;
      font-weight: 600;
    }

    .decision.good {
      background: #082d12;
      border-left: 4px solid #00ff66;
      color: #adffbf;
    }

    .decision.bad {
      background: #3a0707;
      border-left: 4px solid #ff4444;
      color: #ffb3b3;
    }

    .api-status {
      margin-top: 8px;
      font-size: 11px;
      color: #ffdd88;
    }

    .api-status.error {
      color: #ff8888;
    }

    @media (max-width: 900px) {
      .grid {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
<div class="overlay">
  <div class="container">
    <h1>SALVAGE 4.4 – CALCUL CMAT</h1>
    <div class="sub">
      Estime tes gains à partir de <b>Construction Salvage</b> → <b>Construction Materials</b>.
    </div>

    <div class="grid">

      <!-- ======================= GAUCHE ======================= -->
      <div class="panel">
        <div class="panel-title">Entrées</div>

        <label>Prix Construction Salvage (auto UEX)</label>
        <input id="prixSalvage" type="number" value="0" readonly />

        <label>Prix Construction Materials (auto UEX)</label>
        <input id="prixCmat" type="number" value="0" readonly />

        <label>SCU pour Salvation / Vulture / Fortune</label>
        <input id="scuLight" type="number" value="0" />

        <label>SCU pour Reclaimer</label>
        <input id="scuReclaimer" type="number" value="0" />

        <div class="tag-row">
          <div class="tag">Rendement Light Ships : 30 %</div>
          <div class="tag red">Reclaimer : 15 %</div>
        </div>

        <div id="apiStatus" class="api-status">Chargement des prix...</div>
      </div>

      <!-- ======================= DROITE ======================= -->
      <div class="panel">
        <div class="panel-title">Résultats estimés</div>

        <div class="result-block">
          <div class="result-head">Salvation / Vulture / Fortune</div>
          <div id="lightValues" class="result-values"></div>
          <div id="lightDecision" class="decision"></div>
        </div>

        <div class="result-block">
          <div class="result-head">Reclaimer</div>
          <div id="recValues" class="result-values"></div>
          <div id="recDecision" class="decision"></div>
        </div>

      </div>
    </div>
  </div>
</div>

<script>
/* ============================================================
   CONSTANTES
============================================================ */
const REND_LIGHT = 0.30;
const REND_REC = 0.15;

/* Inputs */
const prixSalvageInput = document.getElementById("prixSalvage");
const prixCmatInput    = document.getElementById("prixCmat");
const scuLightInput    = document.getElementById("scuLight");
const scuRecInput      = document.getElementById("scuReclaimer");

/* Outputs */
const lightValues = document.getElementById("lightValues");
const lightDecision = document.getElementById("lightDecision");
const recValues = document.getElementById("recValues");
const recDecision = document.getElementById("recDecision");
const apiStatus = document.getElementById("apiStatus");

/* Format */
function fmt(n){ return Number(n).toLocaleString("fr-FR"); }

/* ============================================================
   CALCULS
============================================================ */
function update() {
    const ps = Number(prixSalvageInput.value)||0;
    const pc = Number(prixCmatInput.value)||0;
    const sl = Number(scuLightInput.value)||0;
    const sr = Number(scuRecInput.value)||0;

    /* --- Light ships --- */
    const lightBrut = sl * ps;
    const lightSCU = sl * REND_LIGHT;
    const lightRef = lightSCU * pc;

    lightValues.textContent =
        `SCU Salvage : ${fmt(sl)}\n` +
        `SCU CMAT après raffinage : ${fmt(lightSCU)}\n\n` +
        `Valeur brute : ${fmt(lightBrut)} aUEC\n` +
        `Valeur raffinée : ${fmt(lightRef)} aUEC`;

    if(lightRef > lightBrut){
        lightDecision.className = "decision good";
        lightDecision.textContent = `✅ Raffiner (+${fmt(lightRef-lightBrut)} aUEC)`;
    } else {
        lightDecision.className = "decision bad";
        lightDecision.textContent = `❌ Vendre brut (+${fmt(lightBrut-lightRef)} aUEC)`;
    }

    /* --- Reclaimer --- */
    const recBrut = sr * ps;
    const recSCU = sr * REND_REC;
    const recRef = recSCU * pc;

    recValues.textContent =
        `SCU Salvage : ${fmt(sr)}\n` +
        `SCU CMAT après raffinage : ${fmt(recSCU)}\n\n` +
        `Valeur brute : ${fmt(recBrut)} aUEC\n` +
        `Valeur raffinée : ${fmt(recRef)} aUEC`;

    if(recRef > recBrut){
        recDecision.className = "decision good";
        recDecision.textContent = `✅ Raffiner (+${fmt(recRef-recBrut)} aUEC)`;
    } else {
        recDecision.className = "decision bad";
        recDecision.textContent = `❌ Vendre brut (+${fmt(recBrut-recRef)} aUEC)`;
    }
}

/* Mise à jour dynamique */
[scuLightInput, scuRecInput].forEach(el =>
    el.addEventListener("input", update)
);

/* ============================================================
   FETCH UEX VIA WORKER
============================================================ */
async function loadPrices() {
    try {
        const res = await fetch("https://salvage-uex-proxy.yoyoastico74.workers.dev/");
        const data = await res.json();

        prixSalvageInput.value = data.salvagePrice ?? 0;
        prixCmatInput.value = data.cmatPrice ?? 0;

        apiStatus.textContent = "Prix mis à jour automatiquement ✔";
        apiStatus.classList.remove("error");

        update();
    } catch (err) {
        apiStatus.textContent = "❌ Impossible de charger les prix UEX";
        apiStatus.classList.add("error");
    }
}

loadPrices();
update();
</script>

</body>
</html>
