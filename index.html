<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Salvage 4.4 – CMAT Calculator</title>

<style>
    body {
        margin: 0;
        padding: 0;
        font-family: Arial, sans-serif;
        background: url('ScreenShot-2025-12-03_14-48-51-509.jpg') no-repeat center center fixed;
        background-size: cover;
        color: #f7d36a;
        text-shadow: 2px 2px 4px #000;
    }

    .container {
        background: rgba(0, 0, 0, 0.75);
        max-width: 1100px;
        margin: 40px auto;
        padding: 25px;
        border: 2px solid #ff9900;
        border-radius: 10px;
    }

    h1 {
        font-size: 34px;
        text-align: center;
        color: #ffcc33;
    }

    .grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 25px;
    }

    .box {
        background: rgba(20, 20, 20, 0.85);
        padding: 20px;
        border-radius: 10px;
        border: 1px solid #ffaa33;
    }

    label {
        font-size: 18px;
        display: block;
        margin-top: 10px;
    }

    input {
        width: 100%;
        padding: 10px;
        font-size: 18px;
        margin-top: 5px;
        border-radius: 6px;
        border: 1px solid #ffaa33;
        background: #222;
        color: #ffdd88;
    }

    .result {
        font-size: 20px;
        margin-top: 15px;
        background: rgba(255,165,0,0.15);
        padding: 10px;
        border-radius: 8px;
    }
</style>
</head>

<body>
<div class="container">
    <h1>SALVAGE 4.4 – CALCUL CMAT</h1>

    <div class="grid">
        <!-- COLONNE GAUCHE -->
        <div class="box">
            <h2>Entrées</h2>

            <label>SCU Construction Salvage (Salvation / Vulture / Fortune)</label>
            <input id="scu_light" type="number" value="160">

            <label>SCU Construction Salvage (Reclaimer)</label>
            <input id="scu_reclaimer" type="number" value="320">

            <label>Prix CMAT brut (via UEX)</label>
            <input id="price_raw" type="number" value="0">

            <label>Prix CMAT raffiné (via UEX)</label>
            <input id="price_refined" type="number" value="0">

            <button onclick="calculate()" style="
                margin-top:20px;padding:10px 20px;
                background:#ffaa00;color:#000;font-size:20px;
                border-radius:6px;cursor:pointer;">
                Calculer
            </button>
        </div>

        <!-- COLONNE DROITE -->
        <div class="box">
            <h2>Résultats estimés</h2>

            <div class="result" id="result_light">
                Salvation / Vulture / Fortune :
                <br>Non raffiné : ...
                <br>Raffiné : ...
            </div>

            <div class="result" id="result_reclaimer">
                Reclaimer :
                <br>Non raffiné : ...
                <br>Raffiné : ...
            </div>
        </div>
    </div>
</div>

<script>
// -----------------------------------------------
// 🔑 PLACE TA CLÉ API UEX ICI :
const API_KEY = "METTRE_TA_CLE_ICI";
// -----------------------------------------------

// --- Récupérer les prix UEX automatiquement ---
async function loadUEXPrices() {
    try {
        const req = await fetch(
            "https://api.uexcorp.space/v2/items/prices",
            { headers: { "Authorization": "Bearer " + API_KEY } }
        );

        const data = await req.json();

        // Cherche Construction Material
        const cmat = data.data.find(i => i.name.toLowerCase().includes("construction material"));

        if (cmat) {
            document.getElementById("price_raw").value = cmat.price_sell;
            document.getElementById("price_refined").value = cmat.price_buy;
        }
    } catch (err) {
        console.error("Erreur API UEX :", err);
    }
}

loadUEXPrices();

// --- Calcul salvage ---
function calculate() {

    const lightSCU = Number(document.getElementById("scu_light").value);
    const recSCU = Number(document.getElementById("scu_reclaimer").value);
    const priceRaw = Number(document.getElementById("price_raw").value);
    const priceRef = Number(document.getElementById("price_refined").value);

    // Rendements salvage
    const lightRate = 0.30;    // Salvation / Vulture / Fortune
    const recRate = 0.15;      // Reclaimer (mass losses)

    const lightRaw = lightSCU * priceRaw;
    const lightRef = (lightSCU * lightRate) * priceRef;

    const recRaw = recSCU * priceRaw;
    const recRef = (recSCU * recRate) * priceRef;

    document.getElementById("result_light").innerHTML =
        `Salvation / Vulture / Fortune :
        <br><b>Non raffiné :</b> ${lightRaw.toLocaleString()} aUEC
        <br><b>Raffiné :</b> ${lightRef.toLocaleString()} aUEC`;

    document.getElementById("result_reclaimer").innerHTML =
        `Reclaimer :
        <br><b>Non raffiné :</b> ${recRaw.toLocaleString()} aUEC
        <br><b>Raffiné :</b> ${recRef.toLocaleString()} aUEC`;
}
</script>

</body>
</html>
